 <!-- Home Section -->
      <section id="home-section" class="pt-28 pb-20 px-6">
        <div class="max-w-7xl mx-auto">

              Explore Events

              <div class="text-[var(--muted)]">Participants</div>

            <div class="glass-card stat-card p-6 scroll-reveal" style="transition-delay: 0.3s">
              <div class="text-4xl font-bold text-[var(--accent)] mb-2">8</div>
              <div class="text-[var(--muted)]">Departments</div>
            </div>
            <div class="glass-card stat-card p-6 scroll-reveal" style="transition-delay: 0.4s">
              <div class="text-4xl font-bold text-[var(--accent)] mb-2">95%</div>
              <div class="text-[var(--muted)]">Satisfaction</div>
            </div>
          </div>
          
          <!-- Featured Events -->
          <div class="mb-16">
            <h2 class="text-3xl font-bold mb-8 scroll-reveal">Featured Events</h2>

          <!-- Categories -->

                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--accent)" stroke-width="2">

                <div class="text-sm text-[var(--muted)]">8 events</div>

              <button class="glass-card p-6 text-left hover:border-[var(--accent)] transition-all group" onclick="filterEvents('cultural')">

                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#ff6b6b" stroke-width="2">
                    <circle cx="12" cy="12" r="10"/>
                    <path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01"/>

                </div>

              <button class="glass-card p-6 text-left hover:border-[var(--accent)] transition-all group" onclick="filterEvents('workshop')">

                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="var(--warning)" stroke-width="2">
                    <path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/>

                <div class="text-sm text-[var(--muted)]">5 events</div>

              <button class="glass-card p-6 text-left hover:border-[var(--accent)] transition-all group" onclick="filterEvents('seminar')">

                  <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#74b9ff" stroke-width="2">
                    <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>

        </div>

      <!-- Events Section -->
      <section id="events-section" class="pt-28 pb-20 px-6 hidden">
        <div class="max-w-7xl mx-auto">
          <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 mb-8">
            <div>
              <h1 class="text-4xl font-bold mb-2">All Events</h1>
              <p class="text-[var(--muted)]">Discover and register for upcoming events</p>
            </div>
            
            <div class="flex flex-wrap gap-3">
              <button class="btn-secondary text-sm filter-btn active" data-filter="all">All</button>
              <button class="btn-secondary text-sm filter-btn" data-filter="technical">Technical</button>
              <button class="btn-secondary text-sm filter-btn" data-filter="cultural">Cultural</button>
              <button class="btn-secondary text-sm filter-btn" data-filter="workshop">Workshop</button>
              <button class="btn-secondary text-sm filter-btn" data-filter="seminar">Seminar</button>
            </div>
          </div>
          
          <div id="events-list" class="grid md:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
      </section>
