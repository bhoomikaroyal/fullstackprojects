<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campus Events</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    background:#f3f6fb;
    overflow-x:hidden;
}

/* NAVBAR */
.navbar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 8%;
    background:#ffffff;
    box-shadow:0 2px 12px rgba(0,0,0,0.04);
    position:fixed;
    width:100%;
    top:0;
    z-index:1000;
}

.logo{
    display:flex;
    align-items:center;
    gap:10px;
    font-size:20px;
    font-weight:700;
    color:#1e293b;
}

.logo span{
    color:#2563eb;
}

.logo-icon{
    background:#2563eb;
    color:white;
    padding:8px;
    border-radius:10px;
    font-size:14px;
}

.nav-links{
    display:flex;
    gap:28px;
}

.nav-links a{
    text-decoration:none;
    color:#475569;
    font-weight:500;
    transition:0.3s;
}

.nav-links a:hover{
    color:#2563eb;
}

.nav-buttons button{
    padding:8px 18px;
    border:none;
    border-radius:25px;
    font-weight:500;
    cursor:pointer;
    transition:0.3s ease;
}

.login{
    background:transparent;
}

.signup{
    background:#2563eb;
    color:white;
}

.signup:hover{
    background:#1e40af;
    transform:translateY(-2px);
}

/* HERO */
.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:150px 8% 80px;
    gap:60px;
}

/* Badge Line */
.badge{
    display:inline-block;
    background:#e0ecff;
    color:#2563eb;
    padding:8px 16px;
    border-radius:25px;
    font-size:14px;
    font-weight:500;
    margin-bottom:25px;
    animation:fadeDown 1s ease;
}

/* TEXT */
.hero-text{
    max-width:620px;
    animation:fadeUp 1.2s ease;
}

.hero-text h1{
    font-size:56px;
    font-weight:800;
    color:#0f172a;
    line-height:1.15;
}

.hero-text h1 span{
    color:#2563eb;
}

.hero-text p{
    margin:22px 0;
    color:#64748b;
    font-size:18px;
    line-height:1.6;
}

/* Buttons */
.hero-buttons{
    display:flex;
    gap:20px;
    margin-top:15px;
}

.primary-btn{
    background:#2563eb;
    color:white;
    padding:14px 28px;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-weight:500;
    transition:0.3s;
}

.primary-btn:hover{
    transform:translateY(-3px);
    box-shadow:0 10px 25px rgba(37,99,235,0.35);
}

.secondary-btn{
    background:white;
    border:1px solid #cbd5e1;
    padding:14px 28px;
    border-radius:30px;
    cursor:pointer;
    font-weight:500;
    transition:0.3s;
}

.secondary-btn:hover{
    background:#f1f5f9;
}

/* IMAGE */
.hero-image{
    position:relative;
    animation:fadeIn 1.5s ease;
}

.hero-image img{
    width:520px;
    height:auto;
    object-fit:contain;
    border-radius:20px;
    box-shadow:0 20px 45px rgba(0,0,0,0.08);
}

/* Floating shapes */
.shape{
    position:absolute;
    width:120px;
    height:120px;
    background:#93c5fd;
    border-radius:25px;
    opacity:0.25;
    animation:float 6s infinite ease-in-out;
}

.shape1{
    top:-25px;
    right:-30px;
}

.shape2{
    bottom:-35px;
    left:-35px;
    animation-delay:2s;
}

/* STATS */
.stats{
    display:flex;
    gap:90px;
    padding:60px 8%;
}

.stat h2{
    font-size:38px;
    font-weight:700;
    color:#2563eb;
}

.stat p{
    color:#64748b;
}

/* Animations */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(40px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeDown{
    from{opacity:0; transform:translateY(-30px);}
    to{opacity:1; transform:translateY(0);}
}

@keyframes fadeIn{
    from{opacity:0;}
    to{opacity:1;}
}

@keyframes float{
    0%{transform:translateY(0);}
    50%{transform:translateY(-18px);}
    100%{transform:translateY(0);}
}

/* Responsive */
@media(max-width:992px){
    .hero{
        flex-direction:column;
        text-align:center;
    }
    .hero-image img{
        width:100%;
    }
    .stats{
        flex-direction:column;
        align-items:center;
        gap:30px;
    }
}
</style>
</head>

<body>

<!-- NAVBAR -->
<div class="navbar">
    <div class="logo">
        <div class="logo-icon">🎓</div>
        Campus<span>Events</span>
    </div>

    <div class="nav-links">
        <a href="#">Home</a>
        <a href="#">Events</a>
        <a href="#">Register</a>
        <a href="#">Contact</a>
    </div>

    <div class="nav-buttons">
        <button class="login">Log In</button>
        <button class="signup">Sign Up</button>
    </div>
</div>

<!-- HERO -->
<section class="hero">
    <div class="hero-text">

        <div class="badge">✨ Spring 2026 Events are Live!</div>

        <h1>
            Discover & Register for 
            <span>Campus Events</span> Easily
        </h1>

        <p>
            Workshops, Seminars, Hackathons & Cultural Events – All in One Place.
            Never miss an opportunity to learn and grow.
        </p>

        <div class="hero-buttons">
            <button class="primary-btn">Browse Events →</button>
            <button class="secondary-btn">Register Now</button>
        </div>
    </div>

    <div class="hero-image">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135755.png" alt="Students">
        <div class="shape shape1"></div>
        <div class="shape shape2"></div>
    </div>
</section>

<!-- STATS -->
<section class="stats">
    <div class="stat">
        <h2 id="events">50+</h2>
        <p>Events</p>
    </div>
    <div class="stat">
        <h2 id="students">2000+</h2>
        <p>Students</p>
    </div>
    <div class="stat">
        <h2 id="clubs">15+</h2>
        <p>Clubs</p>
    </div>
</section>

</body>
</html>
